<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rnr</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000; 
        }
        #ruffle-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        ruffle-player {
            width: 100%;
            height: 100%;
        }
        #loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10;
            background-color: #000;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>
    <div id="ruffle-container"></div>
    <div id="loading-overlay"></div>

    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <script>

        const Engine = Matter.Engine,
              Render = Matter.Render,
              Runner = Matter.Runner,
              Bodies = Matter.Bodies,
              Composite = Matter.Composite;

        const engine = Engine.create();
        const overlay = document.getElementById("loading-overlay");

        const render = Render.create({
            element: overlay,
            engine: engine,
            options: {
                width: window.innerWidth,
                height: window.innerHeight,
                wireframes: false,
                background: '#000'
            }
        });

        const ground = Bodies.rectangle(window.innerWidth / 2, window.innerHeight + 50, window.innerWidth + 200, 100, { isStatic: true });
        const leftWall = Bodies.rectangle(-50, window.innerHeight / 2, 100, window.innerHeight * 2, { isStatic: true });
        const rightWall = Bodies.rectangle(window.innerWidth + 50, window.innerHeight / 2, 100, window.innerHeight * 2, { isStatic: true });
        Composite.add(engine.world, [ground, leftWall, rightWall]);

        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);

        const imageUrls = [
            "https://raw.githubusercontent.com/Zolo101/zelo.dev/master/src/lib/assets/5beam/box.webp",
            "https://raw.githubusercontent.com/Zolo101/zelo.dev/master/src/lib/assets/5beam/companion.webp",
            "https://raw.githubusercontent.com/Zolo101/zelo.dev/master/src/lib/assets/5beam/metal.webp",
            "https://raw.githubusercontent.com/Zolo101/zelo.dev/master/src/lib/assets/5beam/parcel.webp"
        ];

        function dropItem() {
            if (!document.getElementById("loading-overlay")) return; 

            const randomX = Math.random() * (window.innerWidth - 100) + 50;
            const randomImage = imageUrls[Math.floor(Math.random() * imageUrls.length)];

            const collisionSize = 50; 
            const scaleFactor = 0.1; 

            const box = Bodies.rectangle(randomX, -100, collisionSize, collisionSize, {
                restitution: 0.5,
                render: {
                    sprite: {
                        texture: randomImage,
                        xScale: scaleFactor,
                        yScale: scaleFactor
                    }
                }
            });

            Composite.add(engine.world, box);
        }

        const dropInterval = setInterval(dropItem, 150);

        let hasCleanedUp = false;
        function cleanupLoadingScreen() {
            if (hasCleanedUp) return;
            hasCleanedUp = true;

            clearInterval(dropInterval);
            Render.stop(render);
            Runner.stop(runner);
            Engine.clear(engine);

            if (overlay) {
                overlay.remove(); 

            }
        }

        window.RufflePlayer = window.RufflePlayer || {};  
        window.addEventListener("load", (event) => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            const container = document.getElementById("ruffle-container"); 
            container.appendChild(player);

            player.addEventListener("loadeddata", cleanupLoadingScreen);

            player.load({
                url: "messyl.swf",
                letterbox: "on",
                autoplay: "on",               
                unmuteOverlay: "hidden"
            }).then(() => {
                cleanupLoadingScreen(); 

            }).catch((err) => {
                console.error("Error loading Ruffle:", err);
                cleanupLoadingScreen(); 

            });
        });
    </script>
</body>
</html>
